<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background: #fff;
            color: #000;
            margin: 8px;
        }
        h1 {
            font-size: 2em;

            margin: 0.67em 0;

</html>
